<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #333;
            --success-color: #48bb78;
            --error-color: #e53e3e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 700;
            color: #2d3748;
        }

        .result-box {
            margin: 30px 0;
            padding: 30px;
            border-radius: 15px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .prediction-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--success-color);
            margin: 0;
        }
        
        .error-message {
            color: var(--error-color);
            font-weight: 600;
            padding: 20px;
            background: #fff5f5;
            border-radius: 10px;
            border: 1px solid #feb2b2;
        }

        .back-btn {
            display: inline-block;
            background: #4a5568;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #2d3748;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Analysis Complete</h1>
        
        {% if error %}
            <div class="error-message">
                <p>Error: {{ error }}</p>
            </div>
        {% else %}
            <div class="result-box">
                <p style="margin-top: 0; color: #718096; font-weight: 600;">Predicted Disease Progression</p>
                <p class="prediction-value">{{ prediction }}</p>
            </div>
        {% endif %}
        
        <a href="/" class="back-btn">Try Another Prediction</a>
    </div>
</body>
</html>
