# render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# FlowGuard AI – Render Deployment Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Docs: https://render.com/docs/blueprint-spec
#
# Deploys a single Docker-based web service that serves:
#   GET  /       → Health check (JSON)
#   GET  /ui     → Interactive frontend dashboard (HTML)
#   GET  /docs   → Swagger API docs
#   POST /predict-risk   → Single SME risk prediction
#   POST /batch-predict  → Batch risk prediction
#   GET  /model-info     → Model metadata & transparency
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: flowguard-ai
    runtime: docker
    dockerfilePath: ./Dockerfile

    # Deploy from the main branch
    branch: main

    # Auto-deploy on every push to main branch
    autoDeploy: true

    # Health check using GET / endpoint
    healthCheckPath: /

    # Environment variables
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONUTF8
        value: "1"
      - key: PORT
        value: "8000"

    # Free instance type (Render free tier)
    plan: free
